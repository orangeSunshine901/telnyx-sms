<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telnyx SMS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 420px;
      height: 680px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: #00c48c;
      color: #fff;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 { font-size: 18px; font-weight: 600; }

    .logout-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: #fff;
      font-size: 13px;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .logout-btn:hover { background: rgba(255,255,255,0.35); }

    .to-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-bottom: 1px solid #e5e7eb;
      background: #fafafa;
    }

    .to-bar label { font-size: 13px; color: #6b7280; white-space: nowrap; }

    .to-bar input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 14px;
      outline: none;
      color: #111;
    }

    #thread {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .bubble {
      max-width: 72%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.4;
      word-break: break-word;
    }

    .bubble.inbound {
      background: #f0f2f5;
      color: #111;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .bubble.outbound {
      background: #00c48c;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .bubble .meta {
      font-size: 11px;
      margin-top: 4px;
      opacity: 0.6;
    }

    .compose {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid #e5e7eb;
      background: #fff;
    }

    .compose input {
      flex: 1;
      border: 1px solid #d1d5db;
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    .compose input:focus { border-color: #00c48c; }

    .compose button {
      background: #00c48c;
      color: #fff;
      border: none;
      border-radius: 24px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .compose button:hover { background: #00a87a; }
    .compose button:disabled { background: #a7f3d0; cursor: not-allowed; }

    .empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #9ca3af;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Telnyx SMS</h1>
      <form method="POST" action="/logout">
        <button class="logout-btn" type="submit">Sign out</button>
      </form>
    </header>

    <div class="to-bar">
      <label>To:</label>
      <input id="to" type="tel" placeholder="+1 (555) 000-0000" />
    </div>

    <div id="thread">
      <div class="empty" id="empty">No messages yet</div>
    </div>

    <div class="compose">
      <input id="text" type="text" placeholder="Type a message…" />
      <button id="send-btn">Send</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const thread = document.getElementById('thread');
    const empty = document.getElementById('empty');
    const toInput = document.getElementById('to');
    const textInput = document.getElementById('text');
    const sendBtn = document.getElementById('send-btn');

    function formatTime(iso) {
      return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function appendMessage(msg) {
      empty.style.display = 'none';
      const div = document.createElement('div');
      div.className = `bubble ${msg.direction}`;
      div.innerHTML = `
        <div>${msg.text}</div>
        <div class="meta">${msg.direction === 'inbound' ? msg.from : msg.to} · ${formatTime(msg.timestamp)}</div>
      `;
      thread.appendChild(div);
      thread.scrollTop = thread.scrollHeight;
    }

    // Load history
    fetch('/messages')
      .then(r => r.json())
      .then(msgs => msgs.forEach(appendMessage));

    // Real-time inbound
    socket.on('message', appendMessage);

    async function sendMessage() {
      const to = toInput.value.trim();
      const text = textInput.value.trim();
      if (!to || !text) return;

      sendBtn.disabled = true;
      textInput.value = '';

      const res = await fetch('/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ to, text }),
      });

      if (!res.ok) {
        const err = await res.json();
        alert(`Send failed: ${JSON.stringify(err)}`);
        textInput.value = text;
      }

      sendBtn.disabled = false;
      textInput.focus();
    }

    sendBtn.addEventListener('click', sendMessage);
    textInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
  </script>
</body>
</html>
